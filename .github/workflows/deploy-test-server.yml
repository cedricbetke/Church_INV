name: Deploy Test Server

on:
  push:
    branches:
      - testserver
  workflow_dispatch:

concurrency:
  group: deploy-test-server
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_KEY_B64"

      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Ensure target path exists
        run: |
          ssh deploy-target "mkdir -p '${DEPLOY_PATH}' /srv/churchinv/uploads /srv/churchinv/mysql"

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            -e "ssh" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".expo" \
            --exclude "apps/api/.env" \
            --exclude "apps/client/.env" \
            ./ "deploy-target:${DEPLOY_PATH}/"

      - name: Deploy with Docker Compose
        run: |
          ssh deploy-target "
            set -e
            cd '${DEPLOY_PATH}'
            docker compose build --pull
            docker compose up -d --remove-orphans
          "

      - name: Healthcheck
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        run: curl --fail --silent --show-error "$DEPLOY_HEALTHCHECK_URL"
