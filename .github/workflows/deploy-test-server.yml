name: Deploy Test Server

on:
  push:
    branches:
      - testserver
  workflow_dispatch:

concurrency:
  group: deploy-test-server
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          cache-from: type=gha,scope=testserver-api
          cache-to: type=gha,mode=max,scope=testserver-api

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: false
          build-args: |
            EXPO_PUBLIC_API_BASE_URL=/
          cache-from: type=gha,scope=testserver-client
          cache-to: type=gha,mode=max,scope=testserver-client

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
      DEPLOY_HEALTHCHECK_URL: ${{ secrets.DEPLOY_HEALTHCHECK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$DEPLOY_SSH_KEY_B64"

      - name: Prepare SSH
        run: |
          SSH_DIR="$RUNNER_TEMP/deploy-ssh"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          ssh-keygen -y -f "$SSH_DIR/id_ed25519" > /dev/null
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" > "$SSH_DIR/known_hosts"
          cat <<EOF > "$SSH_DIR/config"
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            IdentityFile $SSH_DIR/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile $SSH_DIR/known_hosts
          EOF
          chmod 600 "$SSH_DIR/config"
          echo "SSH_CONFIG=$SSH_DIR/config" >> "$GITHUB_ENV"

      - name: Ensure target path exists
        run: |
          ssh -F "$SSH_CONFIG" deploy-target "
            set -e
            mkdir -p \
              '${DEPLOY_PATH}' \
              '${DEPLOY_PATH}/data/uploads/geraete/thumbs' \
              '${DEPLOY_PATH}/data/uploads/dokumente' \
              '${DEPLOY_PATH}/data/mysql'
          "

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            -e "ssh -F $SSH_CONFIG" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".expo" \
            --exclude "data" \
            --exclude "apps/api/uploads" \
            --exclude "apps/api/.env" \
            --exclude "apps/client/.env" \
            ./ "deploy-target:${DEPLOY_PATH}/"

      - name: Deploy with Docker Compose
        run: |
          ssh -F "$SSH_CONFIG" deploy-target "
            set -e
            cd '${DEPLOY_PATH}'
            set -a
            . apps/api/.env
            set +a
            export UPLOADS_DIR='${DEPLOY_PATH}/data/uploads'
            export MYSQL_DATA_DIR='${DEPLOY_PATH}/data/mysql'
            docker compose build --pull
            docker compose up -d --remove-orphans
          "

      - name: Internal healthcheck
        run: |
          ssh -F "$SSH_CONFIG" deploy-target "
            set -e
            curl --fail --silent --show-error http://localhost:51821/ > /dev/null
          "

      - name: External healthcheck
        if: ${{ env.DEPLOY_HEALTHCHECK_URL != '' }}
        continue-on-error: true
        run: curl --fail --silent --show-error "$DEPLOY_HEALTHCHECK_URL"
