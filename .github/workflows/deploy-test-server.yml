name: Deploy Test Server

on:
  push:
    branches:
      - testserver
  workflow_dispatch:

concurrency:
  group: deploy-test-server
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          cache-from: type=gha,scope=testserver-api
          cache-to: type=gha,mode=max,scope=testserver-api

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: false
          build-args: |
            EXPO_PUBLIC_API_BASE_URL=/
          cache-from: type=gha,scope=testserver-client
          cache-to: type=gha,mode=max,scope=testserver-client

  deploy:
    needs: validate
    runs-on: [self-hosted, testserver]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Validate server env file
        run: |
          test -f apps/api/.env

      - name: Remove stale client env file
        run: |
          rm -f apps/client/.env

      - name: Ensure data directories exist
        run: |
          mkdir -p \
            "$PWD/data/uploads/geraete/thumbs" \
            "$PWD/data/uploads/dokumente" \
            "$PWD/data/mysql" \
            "$PWD/data/backups"
          find "$PWD/data/uploads" -type d -exec chmod u+rwX {} + 2>/dev/null || true
          find "$PWD/data/uploads" -type f -user "$(id -u)" -exec chmod u+rw {} + 2>/dev/null || true

      - name: Deploy with Docker Compose
        run: |
          set -e
          set -a
          . apps/api/.env
          set +a
          export API_HOST_PORT="${API_HOST_PORT:-0}"
          export UPLOADS_DIR="$PWD/data/uploads"
          export MYSQL_DATA_DIR="$PWD/data/mysql"
          export BACKUP_ROOT="$PWD/data/backups"
          export BACKUP_CONFIG_FILE="$PWD/backup.env"
          docker compose build --pull
          docker compose up -d db
          bash scripts/run-db-patches.sh
          docker compose up -d --remove-orphans

      - name: Internal healthcheck
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent --show-error http://localhost:51821/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          curl --fail --show-error http://localhost:51821/
