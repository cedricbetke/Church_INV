name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: false
          cache-from: type=gha,scope=production-api
          cache-to: type=gha,mode=max,scope=production-api

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/client
          push: false
          build-args: |
            EXPO_PUBLIC_API_BASE_URL=/
          cache-from: type=gha,scope=production-client
          cache-to: type=gha,mode=max,scope=production-client

  deploy:
    needs: validate
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Validate server env file
        run: |
          test -f apps/api/.env

      - name: Ensure upload directory exists
        run: |
          mkdir -p \
            /home/inventory/data/uploads/geraete/thumbs \
            /home/inventory/data/uploads/dokumente \
            /home/inventory/data/mysql \
            /home/inventory/data/db-imports

      - name: Deploy with Docker Compose
        run: |
          set -a
          . apps/api/.env
          set +a
          docker compose build --pull
          docker compose up -d --remove-orphans
