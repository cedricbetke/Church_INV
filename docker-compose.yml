services:
  db:
    image: mysql:8.0
    container_name: churchinv-db
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ${MYSQL_DATA_DIR:-/home/inventory/data/mysql}:/var/lib/mysql

  api:
    build:
      context: ./apps/api
    container_name: churchinv-api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - ./apps/api/.env
    ports:
      - "3000:3000"
    volumes:
      - ${UPLOADS_DIR:-/home/inventory/data/uploads}:/app/uploads

  client:
    build:
      context: ./apps/client
      args:
        EXPO_PUBLIC_API_BASE_URL: /
    container_name: churchinv-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "51821:80"
