services:
  api:
    build:
      context: ./apps/api
    container_name: churchinv-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "3000:3000"
    volumes:
      - /srv/churchinv/uploads:/app/uploads

  client:
    build:
      context: ./apps/client
      args:
        EXPO_PUBLIC_API_BASE_URL: /
    container_name: churchinv-client
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "51821:80"
